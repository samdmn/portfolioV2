<div class="container mt-25 flex justify-center text-xl">

  <div class="flex flex-col w-fit gap-5">

    <div class="flex flex-col justify-center items-center max-w-200 gap-3">
      <h1 class="text-3xl font-bold">{{ 'home.title' | translate }}</h1>
      <span class="text-muted-foreground font-semibold">{{ 'home.subtitle' | translate }}</span>
      <p>{{ 'home.description' | translate }}</p>
    </div>

    <div class="flex items-center gap-2">
      <button
        hlmBtn
        [routerLink]="''"
        variant="default"
        class="font-bold">
        {{ 'home.cv-button' | translate }}
      </button>
      <button
        hlmBtn
        [routerLink]="'contact'"
        variant="outline"
        class="font-bold">
        {{ 'home.contact-button' | translate }}
        <svg lucideSend size="20"></svg>
      </button>
    </div>
  </div>


</div>

<!-- >DIV MES SKILLS<!-->
<div class="container mt-25 flex justify-center text-xl mb-10">

  <div class="flex flex-col gap-5 w-full">

    <div class="flex flex-col justify-center items-center gap-3">
      <h1 class="text-3xl font-bold">{{ 'home.my-skills' | translate }}</h1>
    </div>

    <app-scrolldown/>

  </div>


</div>
<div class="container mt-25 flex justify-center text-xl">

  <!-- >DIV image et about<!-->
  <div class="flex w-fit gap-10 items-center max-w-200">

    <!-- >DIV image<!-->
    <div class="max-w-100 max-h-100">
      <img
        class="object-cover rounded-full"
        src="assets/images/pictureofme.png"
        alt="Profile picture" />
    </div>
    <!-- >DIV about<!-->
    <div>
      <h1 class="font-bold">{{ 'home.about-me' | translate }}</h1>
      <p>{{ 'home.description' | translate }}</p>
    </div>
  </div>
</div>
